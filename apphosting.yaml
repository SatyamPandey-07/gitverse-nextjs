# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Environment variables and secrets.
  # env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: webapp-firebase-api-key
  - variable: GEMINI_API_KEY
    secret: gemini-api-key
  - variable: DATABASE_URL
    secret: database-url
  - variable: JWT_SECRET
    secret: jwt-secret

  # NextAuth (Google OAuth)
  # NOTE: NEXTAUTH_URL must match your deployed origin (e.g. https://<your-domain>).
  - variable: NEXTAUTH_URL
    secret: nextauth-url
  - variable: NEXTAUTH_SECRET
    secret: nextauth-secret
  - variable: GOOGLE_CLIENT_ID
    secret: google-client-id
  - variable: GOOGLE_CLIENT_SECRET
    secret: google-client-secret

  # Prisma / Postgres tuning (safe defaults for Cloud Run)
  - variable: PRISMA_ADAPTER
    value: pg
  - variable: PG_POOL_MAX
    value: "2"
  - variable: PG_POOL_CONNECTION_TIMEOUT_MS
    value: "30000"
